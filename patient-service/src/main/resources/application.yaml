server:
  port: 8081

spring:
  application:
    name: patient-service

  datasource:
    url: jdbc:mysql://localhost:3306/meditrack_patient?createDatabaseIfNotExist=true
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true

jwt:
  secret: meditrack_super_secret_key_2024_very_long_string
  expiration: 86400000