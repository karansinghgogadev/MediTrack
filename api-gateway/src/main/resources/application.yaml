# api-gateway/src/main/resources/application.yml
server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**

        - id: patient-service
          uri: lb://patient-service
          predicates:
            - Path=/api/patients/**

        - id: doctor-service
          uri: lb://doctor-service
          predicates:
            - Path=/api/doctors/**

        - id: records-service
          uri: lb://records-service
          predicates:
            - Path=/api/records/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/